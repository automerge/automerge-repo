packages:
  - packages/**
  - examples/**
  - "!packages/create-vite-app/template/**"
  - "!packages/create-repo-node-app/template/**"
allowBuilds:
  "@swc/core": true
  cbor-extract: true
  esbuild: true
  # lmdb's postinstall is a no-op where a prebuilt binary exists (all
  # mainstream platforms) and compiles via node-gyp elsewhere.
  lmdb: true
  # Optional native accelerator pulled in by lmdb (msgpackr); pure-JS
  # fallback exists, but allow the build like cbor-extract above.
  msgpackr-extract: true
  nx: true
  svelte-preprocess: true
overrides:
  semver: ^7.5.2
  # tmp is only pulled transitively (lerna > nx); pin the patched line (older
  # versions have a path-traversal flaw)
  tmp: ^0.2.6
# Supply-chain guard (main waits 3 days after publish): disabled on the
# subduction fork branch, which must install its own fresh prereleases
# (e.g. @automerge/automerge-subduction) immediately after publishing them.
minimumReleaseAge: 0
# pnpm 11 reads these from pnpm-workspace.yaml, not .npmrc.
# Run `pnpm publish` from the subduction fork branch (vs pnpm's default master|main).
publishBranch: subductionjs
# Default dist-tag for ALL publishes from this fork branch, so prereleases never
# land on `latest` and clobber the upstream stable release. pnpm ignores
# `.npmrc tag=...`; this is the value it actually reads.
tag: subduction
# Shared dependency versions kept in sync across the workspace via the `catalog:` protocol.
# Published runtime deps are cataloged too: release publishes via `pnpm -r publish` (see
# release.yaml), which resolves `catalog:` to a real version in the published package.json.
# Peer ranges stay literal — they're intentionally broader than the pinned dev/runtime version.
catalog:
  "@automerge/automerge": 3.3.2
  "@clack/prompts": ^1.7.0
  "@testing-library/jest-dom": ^6.9.1
  "@types/node": ^22.20.0
  "@types/react": ^19.2.17
  "@types/ws": ^8.18.1
  "@vitejs/plugin-react": ^6.0.3
  "@vitest/coverage-v8": ^4.1.10
  "@vitest/ui": ^4.1.10
  cbor-x: ^1.6.4
  debug: ^4.4.3
  eventemitter3: ^5.0.4
  execa: ^9.6.1
  portfinder: ^1.0.38
  react: ^19.2.7
  react-dom: ^19.2.7
  react-error-boundary: ^6.1.2
  rollup-plugin-visualizer: ^7.0.1
  svelte: ^5.56.4
  typescript: ^6.0.3
  uuid: ^14.0.1
  vite: ^8.1.3
  vite-plugin-dts: ^5.0.3
  vite-plugin-wasm: ^3.6.0
  vitest: ^4.1.10
  ws: ^8.21.0
