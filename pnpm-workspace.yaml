packages:
  - packages/**
  - examples/**
  - "!packages/create-vite-app/template/**"
  - "!packages/create-repo-node-app/template/**"
allowBuilds:
  "@swc/core": true
  cbor-extract: true
  esbuild: true
  nx: true
  svelte-preprocess: true
overrides:
  semver: ^7.5.2
  # tmp is only pulled transitively (lerna > nx); pin the patched line (older
  # versions have a path-traversal flaw)
  tmp: ^0.2.6
# Supply-chain guard: wait 3 days (4320 minutes) after a version is published before
# installing it, so a malicious or compromised release has time to be detected and
# unpublished from the registry before it can land in our dependency tree.
minimumReleaseAge: 4320
# TEMPORARY (remove after re-running the update once the freshly-pulled transitive deps age
# past the gate, ~2026-05-28): skip the pre-script deps check so build/test/lint can run in
# the meantime. minimumReleaseAge above is still enforced on an explicit `pnpm install`.
verifyDepsBeforeRun: false
# Shared dependency versions kept in sync across the workspace via the `catalog:` protocol.
# Only devDependencies and deps of private (unpublished) packages are cataloged: `lerna
# publish` does NOT resolve `catalog:`, so a published package's runtime deps must stay as
# literal ranges or consumers would receive a broken "catalog:" specifier. (Switching to
# `pnpm publish`, which rewrites `catalog:`, would let the runtime deps be cataloged too.)
catalog:
  "@testing-library/jest-dom": ^6.9.1
  "@types/react": ^18.3.29
  "@vitest/coverage-v8": ^4.1.7
  "@vitest/ui": ^4.1.7
  react: ^18.3.1
  react-dom: ^18.3.1
  react-error-boundary: ^5.0.0
  rollup-plugin-visualizer: ^7.0.1
  ts-node: ^10.9.2
  typescript: ^6.0.3
  vite: ^8.0.14
  vite-plugin-dts: ^5.0.1
  vitest: ^4.1.7
