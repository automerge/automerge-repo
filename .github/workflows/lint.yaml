name: Lint
on:
  push:
    branches:
      - main
  pull_request:
    types:
      [
        opened,
        edited,
        synchronize,
        reopened,
        ready_for_review,
        review_requested,
      ]
    branches:
      - main
jobs:
  run-tests:
    if: github.event.pull_request.draft == false
    name: Lint Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - name: Install and Build
        run: |
          pnpm install
          pnpm build
      - name: Lint
        run: pnpm lint
